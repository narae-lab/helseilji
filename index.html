<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FitLog</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e1e2e" />

    <!-- 아이폰 PWA 지원 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitLog" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <style>
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      body { margin: 0; padding: 0; background: #1e1e2e; }
      button { outline: none !important; box-shadow: none !important; -webkit-appearance: none; }
      button:hover, button:focus, button:active { outline: none !important; box-shadow: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js");
        });
      }
    </script>
  </body>
</html>
